ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true
packages:
  - examples/**

catalogs:
  dev:
    "@nuxt/kit": 4.4.8
    "@nuxt/schema": 4.4.8
    "@rspack/core": 2.0.8
    "@types/node": 25.9.4
    esbuild: 0.28.0
    oxfmt: 0.56.0
    oxlint: 1.68.0
    oxlint-tsgolint: 0.23.0
    publint: 0.3.21
    rolldown: 1.1.3
    rollup: 4.62.2
    tsdown: 0.22.3
    typescript: 6.0.3
    vite: 8.0.16
    vitest: 4.1.8
    vitest-testdirs: 4.4.3
    webpack: 5.108.0

  example:
    "@rspack/cli": 2.0.8
    "@rspack/dev-server": 2.1.0

  prod:
    git-url-parse: 16.1.0
    simple-git: 3.36.0
    unplugin: 3.2.0

onlyBuiltDependencies:
  - esbuild
minimumReleaseAgeExclude:
  # Renovate security update: pnpm@11.8.0
  - pnpm@11.8.0
