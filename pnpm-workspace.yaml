ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true
packages:
  - examples/**

catalogs:
  dev:
    "@nuxt/kit": 4.4.7
    "@nuxt/schema": 4.4.7
    "@rspack/core": 2.0.6
    "@types/node": 25.9.2
    esbuild: 0.28.0
    oxfmt: 0.53.0
    oxlint: 1.68.0
    oxlint-tsgolint: 0.23.0
    publint: 0.3.21
    rolldown: 1.1.0
    rollup: 4.61.1
    tsdown: 0.22.2
    typescript: 6.0.3
    vite: 8.0.16
    vitest: 4.1.8
    vitest-testdirs: 4.4.3
    webpack: 5.107.2

  example:
    "@rspack/cli": 2.0.6
    "@rspack/dev-server": 2.0.3

  prod:
    git-url-parse: 16.1.0
    simple-git: 3.36.0
    unplugin: 3.0.0

onlyBuiltDependencies:
  - esbuild
minimumReleaseAgeExclude:
  # Renovate security update: pnpm@11.8.0
  - pnpm@11.8.0
